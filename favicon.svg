<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="top">
      <rect x="0" y="0" width="64" height="32"/>
    </clipPath>
    <clipPath id="bot">
      <rect x="0" y="32" width="64" height="32"/>
    </clipPath>
  </defs>
  <g clip-path="url(#top)" transform="rotate(-25 32 32)">
    <ellipse cx="32" cy="32" rx="30" ry="22" fill="none" stroke="#999" stroke-width="3.5"/>
  </g>
  <circle cx="32" cy="32" r="15" fill="#0A0A0A"/>
  <g clip-path="url(#bot)" transform="rotate(-25 32 32)">
    <ellipse cx="32" cy="32" rx="30" ry="22" fill="none" stroke="#FFF" stroke-width="4"/>
  </g>
</svg>
