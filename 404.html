:root.dark {
  --paper: #11131A;
  --navy: #9BB5D6;
  --text: #D6D8DD;
  --muted: #878C99;
  --card: #1A1D27;
  --border: rgba(255,255,255,0.08);
}
:root.dark .hero-logo img { filter: invert(1); }
@media (prefers-color-scheme: dark) {
  :root:not(.light) .hero-logo img { filter: invert(1); }
}
.theme-toggle {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  width: 2.2rem;
  height: 2.2rem;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
  transition: opacity 0.2s;
  z-index: 100;
}
.theme-toggle:hover { opacity: 1; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Source Sans Pro', sans-serif;
  color: var(--text);
  background: var(--paper);
  line-height: 1.7;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 780px; margin: 0 auto; padding: 0 3rem; display: flex; flex-direction: column; min-height: 100vh; }
.hero { text-align: center; padding: 6rem 0 1rem; flex: 1; }

  font-size: 0.92rem;
  color: var(--muted);
  max-width: 400px;
  margin: 0 auto 1.5rem;
  line-height: 1.6;
}
.hero a {
  display: inline-block;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--navy);
  border: 1px solid var(--navy);
  padding: 0.4rem 1.2rem;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
}
.hero a:hover { background: var(--navy); color: #fff; }
footer {
  padding: 1.5rem 0;
  border-top: 1px solid var(--border);

<div class="container">
  <div class="hero">
    <div class="hero-logo">
      <a href="/"><img src="/logo.png" alt="Closure Research Initiative"></a>
    </div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The requested page does not exist at this address. The universe may be closed, but this URL is open.</p>
    <a href="/">Return to home page</a>
  </div>
  <footer>
    <span>&copy; 2026 Chast K. Wolfe. Closure Research Initiative. All rights reserved.</span>
  </footer>
</div>
<button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">&#9790;</button>
<script>
(function() {
  var t = document.getElementById('themeToggle');
  var r = document.documentElement;
  var s = localStorage.getItem('theme');
  if (s === 'dark') r.classList.add('dark');
  else if (s === 'light') r.classList.add('light');
  t.addEventListener('click', function() {
    if (r.classList.contains('dark')) {
      r.classList.remove('dark');
      r.classList.add('light');
      localStorage.setItem('theme', 'light');
    } else {
      r.classList.remove('light');
      r.classList.add('dark');
      localStorage.setItem('theme', 'dark');
    }
  });
})();
</script>
